name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Skrivbordsversionens tester
        run: mvn -B -ntp test

      - name: Webbversionens tester
        run: mvn -B -ntp test
        working-directory: web
