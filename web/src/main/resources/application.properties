server.servlet.context-path=/bankomat-2-0
spring.sql.init.mode=always

# Local dev default: H2 in-memory with PostgreSQL compatibility mode
spring.datasource.url=jdbc:h2:mem:bankomat;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
