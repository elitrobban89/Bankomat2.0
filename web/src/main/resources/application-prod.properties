# Production profile: existing PostgreSQL on Render
# Render provides DATABASE_URL as postgres://user:pass@host/db
# Spring Boot needs jdbc:postgresql:// format
spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT:5432}/${PGDATABASE}?sslmode=require
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
