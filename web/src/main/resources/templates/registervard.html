<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Registervård')}"></head>
<body>
<div class="atm-machine">
  <div th:replace="~{fragments :: atm-top}"></div>
  <div class="atm-mid">
    <div th:replace="~{fragments :: atm-side-left}"></div>
    <div class="atm-screen">
      <div th:replace="~{fragments :: screen-bar('REGISTERVÅRD')}"></div>
      <div class="screen-main">
        <div class="screen-welcome">
          <h2>Registervård</h2>
          <p>Hantera kontoinnehavare och konton</p>
        </div>
        <a class="menu-btn" th:href="@{/registervard/ny-person}">Ny kontoinnehavare</a>
        <a class="menu-btn" th:href="@{/registervard/nytt-konto}">Nytt konto</a>
        <a class="menu-btn secondary" th:href="@{/registervard/personer}">Visa kontoinnehavare</a>
        <a class="menu-btn secondary" th:href="@{/}">Tillbaka till meny</a>
      </div>
    </div>
    <div th:replace="~{fragments :: atm-side-right}"></div>
  </div>
  <div th:replace="~{fragments :: atm-bottom}"></div>
</div>
</body>
</html>
