<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<!-- HEAD -->
<th:block th:fragment="head(title)">
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="${title} + ' – Bankomat 2.0'">Bankomat 2.0</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/style.css}"/>
</th:block>

<!-- ATM TOP SECTION -->
<div th:fragment="atm-top" class="atm-top">
  <div class="status-lamp" id="status-lamp">
    <span class="led"></span>
    <span class="lamp-label">I drift</span>
  </div>
  <div class="receipt-slot">
    <div class="receipt-housing">
      <div class="receipt-slit"></div>
      <div class="receipt-wrap"></div>
    </div>
    <span class="receipt-label">Kvitto</span>
  </div>
  <div class="atm-brand">BANKOMAT 2.0</div>
  <div class="atm-subtitle">Weras Betalservice AB</div>
  <div class="card-slot-outer">
    <div class="card-slot-housing"><div class="card-slot-slit"></div></div>
    <span class="card-slot-label">Sätt i kort / Insert card</span>
  </div>
</div>

<!-- SIDE KEYS LEFT -->
<div th:fragment="atm-side-left" class="atm-side left">
  <div class="side-key"></div>
  <div class="side-key"></div>
  <div class="side-key"></div>
  <div class="side-key"></div>
</div>

<!-- SIDE KEYS RIGHT -->
<div th:fragment="atm-side-right" class="atm-side right">
  <div class="side-key"></div>
  <div class="side-key"></div>
  <div class="side-key"></div>
  <div class="side-key"></div>
</div>

<!-- SCREEN BAR -->
<div th:fragment="screen-bar(title)" class="screen-bar">
  <span class="screen-title" th:text="${title}">MENU</span>
  <span class="screen-clock" id="screen-clock">--:--</span>
</div>

<!-- ATM BOTTOM (keypad + cash slot + loading + scripts) -->
<div th:fragment="atm-bottom" class="atm-bottom-wrapper">
  <div id="loading-overlay" class="loading-overlay">
    <div class="loading-spinner"></div>
    <span class="loading-text">Bearbetar</span>
  </div>
  <div class="atm-cash-slot">
    <div class="cash-housing"><div class="cash-slit"></div></div>
    <span class="cash-label">Uttagsfack / Cash dispenser</span>
  </div>
  <div class="atm-keypad-section">
    <div class="keypad-grid">
      <div class="num-key">1</div><div class="num-key">2</div><div class="num-key">3</div>
      <div class="num-key">4</div><div class="num-key">5</div><div class="num-key">6</div>
      <div class="num-key">7</div><div class="num-key">8</div><div class="num-key">9</div>
      <div class="num-key">*</div><div class="num-key">0</div><div class="num-key">#</div>
    </div>
    <div class="special-keys">
      <div class="sp-key cancel" th:attr="data-href=@{/}">AVBRYT</div>
      <div class="sp-key clear">RENSA</div>
      <div class="sp-key enter">OK ▶</div>
    </div>
  </div>
  <script>
    (function () {
      function tick() {
        var el = document.getElementById('screen-clock');
        if (!el) return;
        var d = new Date();
        el.textContent =
          String(d.getHours()).padStart(2, '0') + ':' +
          String(d.getMinutes()).padStart(2, '0');
      }
      tick();
      setInterval(tick, 15000);

      // Skala hela bankomaten så att den får plats i fönstrets höjd
      function fitAtm() {
        var m = document.querySelector('.atm-machine');
        if (!m) return;
        m.style.zoom = '';
        if (window.innerWidth <= 580) return;
        var scale = (window.innerHeight - 30) / m.offsetHeight;
        if (scale < 1) m.style.zoom = scale;
      }
      window.addEventListener('resize', fitAtm);
      window.addEventListener('load', fitAtm);

      var reduceMotion = window.matchMedia &&
          window.matchMedia('(prefers-reduced-motion: reduce)').matches;

      // CRT: rullande band + vinjett-overlay på varje sida
      function crtSetup() {
        var screen = document.querySelector('.atm-screen');
        if (!screen) return;
        var ov = document.createElement('div');
        ov.className = 'crt-overlay';
        screen.appendChild(ov);
      }

      // Matrix-regn bakom maskinen
      function matrixRain() {
        if (reduceMotion || window.innerWidth <= 580) return;
        var cv = document.createElement('canvas');
        cv.className = 'matrix-bg';
        document.body.appendChild(cv);
        var ctx = cv.getContext('2d');
        var chars = '01kr$€#*+=-<>01';
        var fs = 14, drops = [];
        function resize() {
          cv.width = window.innerWidth;
          cv.height = window.innerHeight;
          drops = [];
          for (var i = 0; i < Math.floor(cv.width / fs); i++) {
            drops.push(Math.random() * -60);
          }
        }
        resize();
        window.addEventListener('resize', resize);
        setInterval(function () {
          if (document.hidden) return;
          ctx.fillStyle = 'rgba(2,4,2,0.12)';
          ctx.fillRect(0, 0, cv.width, cv.height);
          ctx.fillStyle = 'rgba(0,255,127,0.32)';
          ctx.font = fs + 'px monospace';
          for (var i = 0; i < drops.length; i++) {
            ctx.fillText(chars[Math.floor(Math.random() * chars.length)], i * fs, drops[i] * fs);
            if (drops[i] * fs > cv.height && Math.random() > 0.975) drops[i] = 0;
            drops[i] += 0.5;
          }
        }, 66);
      }

      // Kortet glider in i kortläsaren
      function insertCardAnim() {
        var outer = document.querySelector('.card-slot-outer');
        if (!outer) return;
        var card = document.createElement('div');
        card.className = 'insert-card';
        outer.appendChild(card);
        outer.classList.add('inserting');
        setTimeout(function () {
          card.remove();
          outer.classList.remove('inserting');
        }, 2800);
      }

      // Intro en gång per session:
      // CRT power-on → BIOS-boot → SÄTT IN DITT KORT → kort → LÄSER KORT
      function intro() {
        if (reduceMotion) return;
        try {
          if (sessionStorage.getItem('atmIntro')) return;
          sessionStorage.setItem('atmIntro', '1');
        } catch (e) { return; }
        var screen = document.querySelector('.atm-screen');
        if (!screen) return;

        screen.classList.add('crt-on');
        setTimeout(function () { screen.classList.remove('crt-on'); }, 1100);

        var ov = document.createElement('div');
        ov.className = 'intro-overlay';
        var boot = document.createElement('pre');
        boot.className = 'boot-text';
        ov.appendChild(boot);
        screen.appendChild(ov);

        var text = 'WERAS BETALSERVICE BIOS v2.0\n' +
                   'COPYRIGHT (C) 1989-2026 WERAS AB\n' +
                   '\n' +
                   'MINNESTEST ........ 64K OK\n' +
                   'KORTLÄSARE ........ OK\n' +
                   'KNAPPSATS ......... OK\n' +
                   'SEDELMATARE ....... OK\n' +
                   'KVITTOSKRIVARE .... OK\n' +
                   'KRYPTOMODUL ....... AES-256\n' +
                   'BANKNÄT ........... ANSLUTEN\n' +
                   'SÄKER LINJE ....... UPPRÄTTAD\n' +
                   '\n' +
                   'SJÄLVTEST KLART - INGA FEL\n' +
                   'SYSTEM REDO';
        var i = 0;
        var typer = setInterval(function () {
          i += 2;
          boot.textContent = text.slice(0, i);
          if (i >= text.length) {
            clearInterval(typer);
            setTimeout(showPrompt, 900);
          }
        }, 14);

        function showPrompt() {
          boot.style.opacity = '0';
          var p = document.createElement('div');
          p.className = 'insert-prompt';
          p.innerHTML =
            '<div class="arrow">▲</div>' +
            '<div class="prompt-card-icon"></div>' +
            '<div class="prompt-title">Sätt in ditt kort</div>' +
            '<div class="prompt-sub">Weras Betalservice AB</div>';
          ov.appendChild(p);
          requestAnimationFrame(function () { p.classList.add('show'); });
          // Låt SÄTT IN DITT KORT-skärmen synas i lugn och ro innan kortet kommer
          setTimeout(function () {
            insertCardAnim();
            setTimeout(function () {
              p.querySelector('.arrow').style.visibility = 'hidden';
              p.querySelector('.prompt-title').textContent = 'Läser kort';
              p.querySelector('.prompt-sub').textContent = 'Ett ögonblick…';
              setTimeout(function () {
                ov.classList.add('done');
                setTimeout(function () { ov.remove(); }, 550);
              }, 1300);
            }, 2600);
          }, 3200);
        }
      }

      // Kvitto skrivs ut efter lyckad transaktion
      function printReceipt() {
        var alertEl = document.querySelector('.alert-success');
        if (!alertEl) return;
        var m = alertEl.textContent.match(/^(Uttag|Insättning|Överföring) på (.+? kr)/);
        if (!m) return;
        var wrap = document.querySelector('.receipt-wrap');
        var housing = document.querySelector('.receipt-housing');
        if (!wrap) return;
        var d = new Date();
        function pad(n) { return String(n).padStart(2, '0'); }
        var paper = document.createElement('div');
        paper.className = 'receipt-paper';
        paper.textContent =
          'WERAS BETALSERVICE\n' +
          'BANKOMAT 2.0\n' +
          '------------------\n' +
          m[1].toUpperCase() + '\n' +
          'BELOPP: ' + m[2] + '\n' +
          d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()) +
          '  ' + pad(d.getHours()) + ':' + pad(d.getMinutes()) + '\n' +
          '------------------\n' +
          'TACK OCH VÄLKOMMEN\n' +
          'ÅTER!';
        wrap.appendChild(paper);
        if (housing) housing.classList.add('printing');
        setTimeout(function () { paper.classList.add('printing'); }, 400);
        setTimeout(function () {
          if (housing) housing.classList.remove('printing');
          paper.style.transform = 'translateY(0)';
          paper.classList.remove('printing');
          paper.classList.add('tearing');
          setTimeout(function () { paper.remove(); }, 600);
        }, 5400);
      }

      // Saldot räknas upp från 0
      function animateCounts() {
        if (reduceMotion) return;
        document.querySelectorAll('.saldo-big, .total-saldo .val').forEach(function (el) {
          var mm = el.textContent.trim().match(/^([\d\s ]+,\d{2})\s*kr$/);
          if (!mm) return;
          var target = parseFloat(mm[1].replace(/[\s ]/g, '').replace(',', '.'));
          if (!isFinite(target) || target <= 0) return;
          var t0 = performance.now(), dur = 700;
          function fmt(v) {
            var parts = v.toFixed(2).replace('.', ',').split(',');
            parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
            return parts.join(',') + ' kr';
          }
          function step(now) {
            var p = Math.min(1, (now - t0) / dur);
            var eased = 1 - Math.pow(1 - p, 3);
            el.textContent = fmt(target * eased);
            if (p < 1) requestAnimationFrame(step);
          }
          requestAnimationFrame(step);
        });
      }

      // Sedlar ramlar ur uttagsfacket efter ett lyckat uttag
      function dispenseCash() {
        if (reduceMotion) return;
        var alertEl = document.querySelector('.alert-success');
        if (!alertEl || alertEl.textContent.indexOf('Uttag') === -1) return;
        var slot = document.querySelector('.atm-cash-slot');
        if (!slot) return;
        var housing = slot.querySelector('.cash-housing');
        if (housing) housing.classList.add('dispensing');
        var bills = 7;
        for (var i = 0; i < bills; i++) {
          (function (i) {
            setTimeout(function () {
              var b = document.createElement('div');
              b.className = 'bill';
              b.textContent = 'KR';
              b.style.left = 'calc(50% + ' + Math.round(Math.random() * 120 - 60) + 'px)';
              b.style.setProperty('--drift', Math.round(Math.random() * 60 - 30) + 'px');
              b.style.setProperty('--spin', Math.round(Math.random() * 70 - 35) + 'deg');
              slot.appendChild(b);
              setTimeout(function () { b.remove(); }, 2000);
            }, i * 170);
          })(i);
        }
        setTimeout(function () {
          if (housing) housing.classList.remove('dispensing');
        }, bills * 170 + 1200);
      }

      document.addEventListener('DOMContentLoaded', function () {
        fitAtm();
        crtSetup();
        matrixRain();
        intro();
        dispenseCash();
        printReceipt();
        animateCounts();

        document.querySelectorAll('form').forEach(function (f) {
          f.addEventListener('submit', function () {
            var ov = document.getElementById('loading-overlay');
            if (ov) ov.classList.add('show');
            var lamp = document.getElementById('status-lamp');
            if (lamp) lamp.classList.add('busy');
          });
        });

        // Snabbvalsknappar: fyll i beloppet i samma formulär
        document.querySelectorAll('.quick-amt').forEach(function (b) {
          b.addEventListener('click', function () {
            var form = b.closest('form');
            if (!form) return;
            var inp = form.querySelector('input[name="belopp"]');
            if (!inp) return;
            inp.value = b.getAttribute('data-amt');
            form.querySelectorAll('.quick-amt').forEach(function (x) {
              x.classList.remove('selected');
            });
            b.classList.add('selected');
            inp.focus();
          });
        });

        // Knappsatsen skriver i det senast fokuserade fältet på skärmen
        var activeInput = null;
        document.addEventListener('focusin', function (e) {
          var t = e.target;
          if (t && t.tagName === 'INPUT' && t.closest('.screen-main')) activeInput = t;
        });

        function keypadTarget() {
          if (activeInput && document.contains(activeInput) && activeInput.offsetParent !== null) {
            return activeInput;
          }
          return document.querySelector('.screen-main details[open] input[name="belopp"]')
              || document.querySelector('.screen-main input[type="text"]');
        }

        document.querySelectorAll('.num-key').forEach(function (k) {
          k.addEventListener('click', function () {
            var inp = keypadTarget();
            if (!inp) return;
            var ch = k.textContent.trim();
            if (ch === '#') inp.value = inp.value.slice(0, -1);      // backsteg
            else if (ch === '*') inp.value += ',';                    // decimalkomma
            else inp.value += ch;
            inp.focus();
            activeInput = inp;
          });
        });

        var clearKey = document.querySelector('.sp-key.clear');
        if (clearKey) clearKey.addEventListener('click', function () {
          var inp = keypadTarget();
          if (inp) { inp.value = ''; inp.focus(); }
        });

        var enterKey = document.querySelector('.sp-key.enter');
        if (enterKey) enterKey.addEventListener('click', function () {
          var inp = keypadTarget();
          if (!inp || !inp.form) return;
          if (inp.form.requestSubmit) inp.form.requestSubmit();
          else inp.form.submit();
        });

        var cancelKey = document.querySelector('.sp-key.cancel');
        if (cancelKey) cancelKey.addEventListener('click', function () {
          window.location.href = cancelKey.getAttribute('data-href') || '/';
        });
      });
    })();
  </script>
</div>

<!-- ALERTS -->
<th:block th:fragment="alerts">
  <div th:if="${error}"   class="alert alert-error"   th:text="${error}"></div>
  <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
</th:block>

</body>
</html>
