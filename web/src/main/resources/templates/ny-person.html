<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Ny kontoinnehavare')}"></head>
<body>
<div class="atm-machine">
  <div th:replace="~{fragments :: atm-top}"></div>
  <div class="atm-mid">
    <div th:replace="~{fragments :: atm-side-left}"></div>
    <div class="atm-screen">
      <div th:replace="~{fragments :: screen-bar('NY KONTOINNEHAVARE')}"></div>
      <div class="screen-main">
        <div class="card">
          <th:block th:replace="~{fragments :: alerts}"></th:block>
          <form th:action="@{/registervard/ny-person}" method="post">
            <div class="form-group">
              <label for="name">Namn *</label>
              <input type="text" id="name" name="name" required
                     th:value="${formName}" placeholder="Förnamn Efternamn"/>
            </div>
            <div class="form-group">
              <label for="gatuadress">Gatuadress</label>
              <input type="text" id="gatuadress" name="gatuadress"
                     th:value="${formGatu}" placeholder="Exempelgatan 1"/>
            </div>
            <div class="form-group">
              <label for="postnr">Postnummer</label>
              <input type="text" id="postnr" name="postnr" maxlength="5"
                     th:value="${formPostnr}" placeholder="12345"/>
            </div>
            <div class="form-group">
              <label for="stad">Stad</label>
              <input type="text" id="stad" name="stad"
                     th:value="${formStad}" placeholder="Stockholm"/>
            </div>
            <hr class="divider"/>
            <div class="btn-row btn-row-2">
              <button type="submit" class="btn btn-primary">Registrera</button>
              <a class="btn btn-secondary" th:href="@{/registervard}">Tillbaka</a>
            </div>
          </form>
        </div>
      </div>
    </div>
    <div th:replace="~{fragments :: atm-side-right}"></div>
  </div>
  <div th:replace="~{fragments :: atm-bottom}"></div>
</div>
</body>
</html>
