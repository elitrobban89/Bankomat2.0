<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Fel')}"></head>
<body>
<div class="page">

  <div th:replace="~{fragments :: header('Bankomat 2.0')}"></div>

  <main class="main">
    <div class="card" style="text-align:center;padding:48px 28px;">
      <div style="font-size:3rem;margin-bottom:16px;"
           th:text="${status == 404} ? '🔍' : '⚠️'">⚠️</div>
      <h2 style="font-size:1.4rem;margin-bottom:8px;color:var(--text);"
          th:text="${status == 404} ? 'Sidan hittades inte' : 'Något gick fel'">Något gick fel</h2>
      <p style="color:var(--hint);font-size:14px;margin-bottom:24px;"
         th:text="${status == 404} ? 'Sidan du letar efter finns inte.' : 'Ett oväntat fel uppstod. Försök igen.'">
        Ett oväntat fel uppstod.
      </p>
      <a class="btn btn-primary" th:href="@{/}">Tillbaka till startsidan</a>
    </div>
  </main>

</div>
</body>
</html>
